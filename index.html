<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stone Paper Scissors</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="main-container">
    <h1 class="animate-title">🪨 Stone | 📄 Paper | ✂️ Scissors</h1>

    <div class="score-board">
      <div class="score">
        <h2>User</h2>
        <p id="user-score">0</p>
      </div>
      <div class="score">
        <h2>Computer</h2>
        <p id="comp-score">0</p>
      </div>
    </div>

    <div class="game">
      <div class="choice" id="rock" title="Stone">🪨</div>
      <div class="choice" id="paper" title="Paper">📄</div>
      <div class="choice" id="scissors" title="Scissors">✂️</div>
    </div>

    <div id="result" class="fade">Make your move!</div>

    <button id="reset-btn">Reset Game</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
